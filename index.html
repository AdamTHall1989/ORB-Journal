<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB Trade Log</title>
<style>
  *{box-sizing:border-box;}
  body{background:#0a0a0a; margin:0; padding:20px; display:flex; justify-content:center;}
  #orb-simple{background:#111; color:#fff; font-family:Arial,Helvetica,sans-serif; font-weight:700; border-radius:10px; padding:28px; border:1px solid #333; width:100%; max-width:900px;}
  #orb-simple h2,#orb-simple h3{font-family:inherit; margin:0 0 20px; font-weight:800;}
  #orb-simple h2{font-size:28px; margin-bottom:24px;}
  #orb-simple h3{font-size:20px; color:#fff; font-weight:800;}
  #orb-simple label{font-size:16px; color:#fff; font-weight:700;}
  #orb-simple input,#orb-simple select{
    background:#1c1c1c; color:#fff; border:2px solid #555; border-radius:6px;
    font-family:inherit; font-weight:700; font-size:18px; padding:12px 14px; width:100%;
  }
  #orb-simple table{width:100%; border-collapse:collapse; font-size:16px; margin-top:20px;}
  #orb-simple th,#orb-simple td{border-bottom:2px solid #444; padding:14px 12px; text-align:left; white-space:nowrap;}
  #orb-simple th{color:#fff; font-weight:800; font-size:15px;}
  #orb-simple td{font-weight:700;}
  #orb-simple button{font-family:inherit; cursor:pointer; border-radius:6px; border:2px solid #666; background:#2a2a2a; color:#fff; padding:14px 22px; font-size:17px; font-weight:800;}
  #orb-simple button:hover{background:#3a3a3a;}
  #orb-simple .del{color:#ff8080; border-color:#5a2c2c; background:transparent; padding:8px 14px; font-size:16px;}
  #orb-simple .win{color:#5eff9d;}
  #orb-simple .loss{color:#ff8080;}
  #orb-simple .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
  #orb-simple .cal-day{background:#1a1a1a; border:2px solid #3a3a3a; border-radius:6px; padding:8px; min-height:64px; font-size:14px; font-weight:700; overflow:hidden;}
  #orb-simple .cal-day .n{color:#bbb; font-size:14px; font-weight:800;}
  #orb-simple .cal-day .p{font-size:13px; margin-top:4px; font-weight:800; overflow-wrap:break-word; line-height:1.2;}
  #orb-simple .cal-head{text-align:center; font-size:14px; color:#ccc; padding-bottom:6px; font-weight:800;}
  #orb-simple .capbar{display:flex; gap:28px; align-items:center; margin-bottom:28px; flex-wrap:wrap;}
  #orb-simple .capbar label{font-size:16px; color:#fff;}
  #orb-simple .toolbar{display:flex; gap:14px; margin-bottom:28px; flex-wrap:wrap;}
  #orb-simple table{overflow-x:auto; display:block;}
  #orb-simple td.notes-cell{white-space:pre-wrap; min-width:220px; max-width:320px;}
  #orb-simple #s-balance{font-size:17px !important; color:#fff !important; font-weight:800;}
  #orb-simple #s-total{font-size:16px !important; color:#fff !important; font-weight:800; margin-top:16px;}
  #orb-simple .fill-row{display:grid; grid-template-columns:1fr 1fr auto; gap:12px; margin-bottom:12px; align-items:center;}
  #orb-simple .fill-remove{color:#ff8080; border-color:#5a2c2c; padding:10px 16px; font-size:15px;}
  #orb-simple .field-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(135px,1fr)); gap:14px; margin-bottom:20px;}
  #orb-simple input[type="date"]{font-size:15px; padding:10px 8px;}
  #orb-simple .field-block{margin-bottom:24px;}
  #orb-simple .section-gap{margin-bottom:32px;}
  #orb-simple .tabs{display:flex; gap:10px; margin-bottom:28px; border-bottom:2px solid #333; padding-bottom:0;}
  #orb-simple .tab-btn{background:transparent; border:none; border-bottom:3px solid transparent; border-radius:0; padding:10px 4px; margin-bottom:-2px; font-size:17px; color:#888;}
  #orb-simple .tab-btn:hover{background:transparent; color:#ccc;}
  #orb-simple .tab-btn.active{color:#fff; border-bottom-color:#5eff9d;}
  #orb-simple .tab-panel{display:none;}
  #orb-simple .tab-panel.active{display:block;}
  #orb-simple .chart-wrap{background:#1a1a1a; border:2px solid #3a3a3a; border-radius:8px; padding:14px; margin-top:20px;}
  #orb-simple #s-chart{width:100%; height:220px; display:block;}
  #orb-simple button.primary{background:#5eff9d; color:#0a2915; border-color:#5eff9d;}
  #orb-simple button.primary:hover{background:#7dffb1;}
  #orb-simple button.secondary{background:transparent; color:#ccc; border-color:#555;}
  #orb-simple button.secondary:hover{background:#232323; color:#fff;}
  #orb-simple button.danger-outline{background:transparent; color:#ff8080; border-color:#5a2c2c;}
  #orb-simple button.danger-outline:hover{background:#2a1414;}
  #orb-simple .divider{border-top:2px solid #2a2a2a; margin:36px 0;}
  #orb-simple .log-toolbar{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap; margin-bottom:20px;}
</style>
</head>
<body>

<div id="orb-simple">
  <h2>ORB Trade Journal</h2>

  <div class="tabs">
    <button class="tab-btn active" id="tab-btn-journal" type="button">Journal</button>
    <button class="tab-btn" id="tab-btn-calendar" type="button">Performance</button>
    <button class="tab-btn" id="tab-btn-log" type="button">Trade log</button>
  </div>

  <div id="tab-calendar" class="tab-panel">
    <div class="capbar">
      <div>
        <label>Starting capital</label>
        <input id="s-capital" type="number" step="0.01" placeholder="5000.00" style="width:140px;">
      </div>
      <div style="font-size:12px; color:#aaa;" id="s-balance"></div>
    </div>

    <div class="chart-wrap">
      <canvas id="s-chart"></canvas>
      <div id="s-chart-empty" style="display:none; color:#888; font-size:14px; text-align:center; padding:20px 0;">Add a starting capital and at least one closed trade to see your capital curve.</div>
    </div>

    <div id="s-cal-wrap" class="section-gap" style="margin-top:28px;">
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:12px;">
        <button id="s-cal-prev">‹</button>
        <h3 id="s-cal-title" style="margin:0;"></h3>
        <button id="s-cal-next">›</button>
      </div>
      <div class="cal-grid" id="s-cal-head"></div>
      <div class="cal-grid" id="s-cal-body" style="margin-top:6px;"></div>
    </div>
  </div>

  <div id="tab-journal" class="tab-panel active">

  <h3 style="margin-bottom:20px;">New trade</h3>

  <div class="field-row">
    <input id="s-date" type="date">
    <input id="s-ticker" placeholder="Ticker">
    <select id="s-dir"><option value="call">Call</option><option value="put">Put</option></select>
    <input id="s-strike" type="number" step="0.5" placeholder="Strike">
    <input id="s-exp" type="date" placeholder="Expiration">
  </div>
  <div class="field-block">
    <label style="display:block; margin-bottom:8px;">Entries — add a row for each fill if you scaled into the position</label>
    <div id="s-fills"></div>
    <button id="s-fill-add" type="button" style="margin-top:8px; font-size:15px; padding:10px 16px;">Add fill</button>
  </div>
  <div class="field-row">
    <input id="s-exit" type="number" step="0.01" placeholder="Exit price">
    <input id="s-exit-date" type="date" placeholder="Exit date">
    <input id="s-fees" type="number" step="0.01" placeholder="Commissions ($)">
  </div>
  <div class="field-block">
    <label style="display:block; margin-bottom:8px;">Trade notes — same five questions every time, so your answers are easy to compare across trades</label>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">Before the trade, I felt...</label>
      <select id="s-note-before">
        <option value="" disabled selected>Select...</option>
        <option>Calm and confident</option>
        <option>Confident but rushed</option>
        <option>Anxious or nervous</option>
        <option>FOMO / chasing the setup</option>
        <option>Distracted</option>
        <option>Neutral</option>
      </select>
    </div>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">During the trade...</label>
      <select id="s-note-during">
        <option value="" disabled selected>Select...</option>
        <option>Followed the plan exactly</option>
        <option>Entered early, before confirmation</option>
        <option>Entered late, chased the move</option>
        <option>Hesitated and missed part of the move</option>
        <option>Deviated from my stop loss</option>
        <option>Stayed disciplined throughout</option>
      </select>
    </div>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">After the trade, I felt...</label>
      <select id="s-note-after">
        <option value="" disabled selected>Select...</option>
        <option>Satisfied with my execution</option>
        <option>Regretful about entry or exit</option>
        <option>Relieved</option>
        <option>Frustrated</option>
        <option>Proud of my discipline</option>
        <option>Neutral</option>
      </select>
    </div>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">What I did well</label>
      <select id="s-note-well">
        <option value="" disabled selected>Select...</option>
        <option>Waited for the 5-minute confirmation</option>
        <option>Waited for the rejection wick</option>
        <option>Respected my stop loss</option>
        <option>Sized the position appropriately</option>
        <option>Stayed patient for the setup</option>
        <option>Journaled honestly</option>
      </select>
    </div>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">What I did poorly</label>
      <select id="s-note-poorly">
        <option value="" disabled selected>Select...</option>
        <option>Entered before confirmation</option>
        <option>Skipped the rejection wick</option>
        <option>Ignored or moved my stop loss</option>
        <option>Oversized the position</option>
        <option>Chased price after missing entry</option>
        <option>Exited too early</option>
        <option>Exited too late</option>
        <option>Nothing — clean execution</option>
      </select>
    </div>

    <div class="field-block">
      <label style="font-size:13px; color:#bbb; margin-bottom:4px;">Additional notes (optional)</label>
      <textarea id="s-note-extra" rows="2" style="width:100%; resize:vertical; background:#1c1c1c; color:#fff; border:2px solid #555; border-radius:6px; font-family:inherit; font-weight:700; font-size:16px; padding:10px 12px;"></textarea>
    </div>
  </div>
  <div id="s-notes-warn" style="display:none; color:#ff8080; font-size:15px; font-weight:800; margin-bottom:16px;">Answer all five trade note dropdowns before saving.</div>
  <div style="display:flex; gap:12px; flex-wrap:wrap;">
    <button id="s-add" class="primary">Save trade</button>
    <button id="s-cancel-edit" type="button" class="danger-outline" style="display:none;">Cancel edit</button>
  </div>
  </div>

  <div id="tab-log" class="tab-panel">

  <h3 style="margin-bottom:20px;">Trade log</h3>

  <div class="log-toolbar">
    <div class="field-row" style="margin:0; flex:1;">
      <div>
        <label style="font-size:13px; color:#bbb; margin-bottom:4px; display:block;">Ticker</label>
        <input id="s-search-ticker" placeholder="e.g. SPY">
      </div>
      <div>
        <label style="font-size:13px; color:#bbb; margin-bottom:4px; display:block;">From</label>
        <input id="s-search-from" type="date">
      </div>
      <div>
        <label style="font-size:13px; color:#bbb; margin-bottom:4px; display:block;">To</label>
        <input id="s-search-to" type="date">
      </div>
    </div>
    <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
      <button id="s-search-clear" type="button" class="secondary">Clear filters</button>
      <button id="s-export" class="secondary">Export data</button>
      <button id="s-import" class="secondary">Import data</button>
      <input id="s-import-file" type="file" accept="application/json" style="display:none;">
    </div>
  </div>

  <div style="overflow-x:auto;">
  <table>
    <thead><tr>
      <th>Date</th><th>Ticker</th><th>Dir</th><th>Strike</th><th>Exp</th><th>Qty</th><th>Entry</th><th>Exit</th><th>Exit date</th><th>Comm.</th><th>P/L</th><th>Notes</th><th></th>
    </tr></thead>
    <tbody id="s-body"></tbody>
  </table>
  </div>
  <div id="s-total" style="margin-top:16px; font-size:12px; color:#aaa;"></div>
  </div>
</div>

<script>
(function(){
  const KEY = 'orb-journal-trades';
  const CAP_KEY = 'orb-journal-capital';
  let rows = [];
  let capital = null;
  let calMonth = new Date(); calMonth.setDate(1);
  let editingIndex = null;

  const NOTE_FIELDS = ['s-note-before','s-note-during','s-note-after','s-note-well','s-note-poorly'];

  function fmtMoney(n){ if(n===null||isNaN(n)) return '—'; const s=n<0?'-':''; return s+'$'+Math.abs(n).toFixed(2); }

  function addFillRow(qty, price){
    const wrap = document.getElementById('s-fills');
    const row = document.createElement('div');
    row.className = 'fill-row';
    row.innerHTML = `
      <input type="number" step="1" class="fill-qty" placeholder="Contracts" value="${qty!==undefined?qty:''}">
      <input type="number" step="0.01" class="fill-price" placeholder="Fill price" value="${price!==undefined?price:''}">
      <button type="button" class="fill-remove">✕</button>
    `;
    row.querySelector('.fill-remove').addEventListener('click', () => {
      if(document.querySelectorAll('.fill-row').length > 1) row.remove();
    });
    wrap.appendChild(row);
  }

  function resetFills(){
    document.getElementById('s-fills').innerHTML = '';
    addFillRow(1, '');
  }

  function resetNotes(){
    NOTE_FIELDS.forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('s-note-extra').value = '';
  }

  function collectNotes(){
    const vals = NOTE_FIELDS.map(id => document.getElementById(id).value);
    if(vals.some(v => !v)) return null;
    const [before, during, after, well, poorly] = vals;
    return { before, during, after, well, poorly, extra: document.getElementById('s-note-extra').value.trim() };
  }

  function notesSummary(n){
    if(!n) return '';
    if(typeof n === 'string') return n;
    let s = `Before: ${n.before} · During: ${n.during} · After: ${n.after} · Well: ${n.well} · Poorly: ${n.poorly}`;
    if(n.extra) s += ` · ${n.extra}`;
    return s;
  }

  function setNotes(n){
    if(!n || typeof n === 'string'){ resetNotes(); return; }
    document.getElementById('s-note-before').value = n.before || '';
    document.getElementById('s-note-during').value = n.during || '';
    document.getElementById('s-note-after').value = n.after || '';
    document.getElementById('s-note-well').value = n.well || '';
    document.getElementById('s-note-poorly').value = n.poorly || '';
    document.getElementById('s-note-extra').value = n.extra || '';
  }

  function clearForm(){
    ['s-date','s-ticker','s-strike','s-exp','s-exit','s-exit-date','s-fees'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('s-dir').value = 'call';
    resetFills();
    resetNotes();
  }

  function startEdit(idx){
    const r = rows[idx];
    editingIndex = idx;
    document.getElementById('s-date').value = r.date || '';
    document.getElementById('s-ticker').value = r.ticker || '';
    document.getElementById('s-dir').value = r.dir || 'call';
    document.getElementById('s-strike').value = r.strike || '';
    document.getElementById('s-exp').value = r.exp || '';
    document.getElementById('s-exit').value = r.exit || '';
    document.getElementById('s-exit-date').value = r.exit_date || '';
    document.getElementById('s-fees').value = r.fees || '';
    document.getElementById('s-fills').innerHTML = '';
    if(Array.isArray(r.fills) && r.fills.length){
      r.fills.forEach(f => addFillRow(f.qty, f.price));
    } else {
      addFillRow(r.qty, r.entry);
    }
    setNotes(r.notes);
    document.getElementById('s-add').textContent = 'Update trade';
    document.getElementById('s-cancel-edit').style.display = 'inline-block';
    switchTab('journal');
    document.getElementById('s-date').scrollIntoView({behavior:'smooth', block:'start'});
  }

  function stopEdit(){
    editingIndex = null;
    document.getElementById('s-add').textContent = 'Save trade';
    document.getElementById('s-cancel-edit').style.display = 'none';
    clearForm();
  }

  function collectFills(){
    return [...document.querySelectorAll('.fill-row')].map(row => ({
      qty: row.querySelector('.fill-qty').value,
      price: row.querySelector('.fill-price').value
    })).filter(f => f.qty !== '' && f.price !== '');
  }

  function fillsSummary(fills){
    const totalQty = fills.reduce((a,f) => a + (parseFloat(f.qty)||0), 0);
    const totalCost = fills.reduce((a,f) => a + (parseFloat(f.qty)||0) * (parseFloat(f.price)||0), 0);
    const avgPrice = totalQty ? totalCost / totalQty : null;
    return { totalQty, avgPrice };
  }
  function tradePnl(r){
    const exit = parseFloat(r.exit), fees = parseFloat(r.fees) || 0;
    if(isNaN(exit)) return null;
    let totalQty, avgEntry;
    if(Array.isArray(r.fills) && r.fills.length){
      const s = fillsSummary(r.fills);
      totalQty = s.totalQty; avgEntry = s.avgPrice;
    } else {
      totalQty = parseFloat(r.qty) || 1;
      avgEntry = parseFloat(r.entry);
    }
    if(!totalQty || avgEntry===null || isNaN(avgEntry)) return null;
    return (exit-avgEntry)*totalQty*100 - fees;
  }

  function load(){
    try{ const v = localStorage.getItem(KEY); rows = v ? JSON.parse(v) : []; }
    catch(e){ rows = []; }
    try{ const c = localStorage.getItem(CAP_KEY); capital = c ? JSON.parse(c) : null; }
    catch(e){ capital = null; }
    if(capital !== null) document.getElementById('s-capital').value = capital;
    render();
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(rows)); }
    catch(e){ console.error(e); }
  }
  function saveCapital(){
    try{ localStorage.setItem(CAP_KEY, JSON.stringify(capital)); }
    catch(e){ console.error(e); }
  }

  function renderCalendar(){
    const head = document.getElementById('s-cal-head');
    head.innerHTML = ['S','M','T','W','T','F','S'].map(d=>`<div class="cal-head">${d}</div>`).join('');

    const year = calMonth.getFullYear(), month = calMonth.getMonth();
    document.getElementById('s-cal-title').textContent = calMonth.toLocaleString('default',{month:'long', year:'numeric'});

    const byDay = {};
    rows.forEach(r => {
      const bucketDate = r.exit_date || r.date;
      if(!bucketDate) return;
      const pnl = tradePnl(r);
      if(pnl === null) return;
      byDay[bucketDate] = (byDay[bucketDate] || 0) + pnl;
    });

    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const body = document.getElementById('s-cal-body');
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += '<div></div>';
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const pnl = byDay[dateStr];
      let bg = '#1a1a1a', color = '#777', ptext = '';
      if(pnl !== undefined){
        color = pnl > 0 ? '#4ade80' : (pnl < 0 ? '#ff6b6b' : '#999');
        bg = pnl > 0 ? 'rgba(74,222,128,0.12)' : (pnl < 0 ? 'rgba(255,107,107,0.12)' : '#1a1a1a');
        ptext = `<div class="p" style="color:${color};">${fmtMoney(pnl)}</div>`;
      }
      cells += `<div class="cal-day" style="background:${bg};"><div class="n">${d}</div>${ptext}</div>`;
    }
    body.innerHTML = cells;
  }

  function renderBalance(){
    const totalPnl = rows.reduce((a,r) => { const p = tradePnl(r); return a + (p||0); }, 0);
    const balEl = document.getElementById('s-balance');
    if(capital === null || isNaN(capital)){ balEl.textContent = ''; return; }
    const bal = capital + totalPnl;
    balEl.textContent = `Balance (after commissions): ${fmtMoney(bal)} — started at ${fmtMoney(capital)}, ${totalPnl>=0?'+':''}${fmtMoney(totalPnl)}`;
  }

  function renderChart(){
    const canvas = document.getElementById('s-chart');
    const emptyMsg = document.getElementById('s-chart-empty');
    const closed = rows
      .map(r => ({ date: r.exit_date || r.date, pnl: tradePnl(r) }))
      .filter(t => t.date && t.pnl !== null)
      .sort((a,b) => a.date.localeCompare(b.date));

    if(capital === null || isNaN(capital) || closed.length === 0){
      canvas.style.display = 'none';
      emptyMsg.style.display = 'block';
      return;
    }
    canvas.style.display = 'block';
    emptyMsg.style.display = 'none';

    const points = [{ date: 'Start', bal: capital }];
    let running = capital;
    closed.forEach(t => { running += t.pnl; points.push({ date: t.date, bal: running }); });

    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.parentElement.clientWidth - 28;
    const cssH = 220;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);

    const padL = 70, padR = 14, padT = 16, padB = 24;
    const plotW = cssW - padL - padR, plotH = cssH - padT - padB;
    const balances = points.map(p => p.bal);
    let lo = Math.min(...balances), hi = Math.max(...balances);
    if(lo === hi){ lo -= 10; hi += 10; }
    const pad = (hi-lo)*0.1; lo -= pad; hi += pad;

    const x = i => padL + (points.length>1 ? (i/(points.length-1))*plotW : plotW/2);
    const y = v => padT + plotH - ((v-lo)/(hi-lo))*plotH;

    ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
    for(let g=0; g<=3; g++){
      const yy = padT + (g/3)*plotH;
      ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL+plotW, yy); ctx.stroke();
      const val = hi - (g/3)*(hi-lo);
      ctx.fillStyle = '#999'; ctx.font = '12px Arial'; ctx.textAlign = 'right';
      ctx.fillText('$'+val.toFixed(0), padL-8, yy+4);
    }

    ctx.beginPath();
    points.forEach((p,i) => { const px=x(i), py=y(p.bal); i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py); });
    ctx.strokeStyle = '#5eff9d'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

    ctx.fillStyle = '#5eff9d';
    points.forEach((p,i) => { ctx.beginPath(); ctx.arc(x(i), y(p.bal), 3, 0, Math.PI*2); ctx.fill(); });

    ctx.fillStyle = '#999'; ctx.font = '12px Arial'; ctx.textAlign = 'left';
    ctx.fillText(points[0].date, padL, cssH-4);
    ctx.textAlign = 'right';
    ctx.fillText(points[points.length-1].date, padL+plotW, cssH-4);
  }

  function render(){
    const body = document.getElementById('s-body');
    const searchTicker = (document.getElementById('s-search-ticker').value || '').trim().toUpperCase();
    const fromDate = document.getElementById('s-search-from').value;
    const toDate = document.getElementById('s-search-to').value;

    const indexed = rows.map((r,i) => ({ r, i }));
    const filtered = indexed.filter(({r}) => {
      if(searchTicker && !(r.ticker||'').toUpperCase().includes(searchTicker)) return false;
      const d = r.date || '';
      if(fromDate && d && d < fromDate) return false;
      if(toDate && d && d > toDate) return false;
      return true;
    });

    let total = 0, count = 0;
    body.innerHTML = filtered.slice().reverse().map(({r, i}) => {
      const idx = i;
      const pnl = tradePnl(r);
      if(pnl !== null){ total += pnl; count++; }
      const cls = pnl===null ? '' : (pnl>0?'win':(pnl<0?'loss':''));
      let qtyDisplay, entryDisplay;
      if(Array.isArray(r.fills) && r.fills.length){
        const s = fillsSummary(r.fills);
        qtyDisplay = s.totalQty;
        entryDisplay = s.avgPrice!==null ? `avg ${s.avgPrice.toFixed(2)}` : '';
        if(r.fills.length > 1){
          entryDisplay += ` <span style="color:#999; font-weight:700; font-size:13px;">(${r.fills.map(f=>`${f.qty}@${f.price}`).join(', ')})</span>`;
        }
      } else {
        qtyDisplay = r.qty || '';
        entryDisplay = r.entry || '';
      }
      return `<tr>
        <td>${r.date||''}</td>
        <td>${(r.ticker||'').toUpperCase()}</td>
        <td>${r.dir}</td>
        <td>${r.strike||''}</td>
        <td>${r.exp||''}</td>
        <td>${qtyDisplay}</td>
        <td>${entryDisplay}</td>
        <td>${r.exit||''}</td>
        <td>${r.exit_date||''}</td>
        <td>${r.fees ? fmtMoney(parseFloat(r.fees)) : '—'}</td>
        <td class="${cls}">${pnl===null?'—':fmtMoney(pnl)}</td>
        <td class="notes-cell">${notesSummary(r.notes)}</td>
        <td style="white-space:nowrap;">
          <button class="edit" data-idx="${idx}" style="padding:6px 10px; font-size:14px;">Edit</button>
          <button class="del" data-idx="${idx}" style="padding:6px 10px; font-size:14px;">✕</button>
        </td>
      </tr>`;
    }).join('');
    const totalLabel = (searchTicker || fromDate || toDate) ? 'Total P/L after commissions (filtered)' : 'Total P/L after commissions';
    document.getElementById('s-total').textContent = count ? `${totalLabel} on ${count} closed trade${count>1?'s':''}: ${fmtMoney(total)}` : '';
    body.querySelectorAll('.del').forEach(b => {
      b.addEventListener('click', () => {
        const idx = parseInt(b.getAttribute('data-idx'));
        rows.splice(idx, 1);
        if(editingIndex === idx) stopEdit();
        save(); render();
      });
    });
    body.querySelectorAll('.edit').forEach(b => {
      b.addEventListener('click', () => startEdit(parseInt(b.getAttribute('data-idx'))));
    });
    renderCalendar();
    renderBalance();
    renderChart();
  }

  document.getElementById('s-add').addEventListener('click', () => {
    const ticker = document.getElementById('s-ticker').value.trim();
    const notes = collectNotes();
    const warn = document.getElementById('s-notes-warn');
    const fills = collectFills();
    if(!ticker) return;
    if(!fills.length){ alert('Enter at least one fill (contracts and price).'); return; }
    if(!notes){ warn.style.display = 'block'; return; }
    warn.style.display = 'none';
    const record = {
      date: document.getElementById('s-date').value,
      ticker,
      dir: document.getElementById('s-dir').value,
      strike: document.getElementById('s-strike').value,
      exp: document.getElementById('s-exp').value,
      fills,
      exit: document.getElementById('s-exit').value,
      exit_date: document.getElementById('s-exit-date').value,
      fees: document.getElementById('s-fees').value,
      notes
    };
    if(editingIndex !== null){
      rows[editingIndex] = record;
    } else {
      rows.push(record);
    }
    save(); render();
    stopEdit();
  });

  document.getElementById('s-cancel-edit').addEventListener('click', () => stopEdit());

  ['s-search-ticker','s-search-from','s-search-to'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => render());
  });
  document.getElementById('s-search-clear').addEventListener('click', () => {
    document.getElementById('s-search-ticker').value = '';
    document.getElementById('s-search-from').value = '';
    document.getElementById('s-search-to').value = '';
    render();
  });

  document.getElementById('s-capital').addEventListener('change', (e) => {
    const v = parseFloat(e.target.value);
    capital = isNaN(v) ? null : v;
    saveCapital(); renderBalance(); renderChart();
  });

  document.getElementById('s-cal-prev').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth()-1); renderCalendar();
  });
  document.getElementById('s-cal-next').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth()+1); renderCalendar();
  });

  document.getElementById('s-export').addEventListener('click', () => {
    const data = { trades: rows, capital: capital };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'orb-journal-backup.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('s-import').addEventListener('click', () => {
    document.getElementById('s-import-file').click();
  });
  document.getElementById('s-import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(Array.isArray(data.trades)){
          rows = data.trades;
          capital = data.capital !== undefined ? data.capital : null;
          save(); saveCapital();
          if(capital !== null) document.getElementById('s-capital').value = capital;
          render();
        }
      }catch(err){ alert('Could not read that backup file.'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('tab-btn-journal').addEventListener('click', () => switchTab('journal'));
  document.getElementById('tab-btn-log').addEventListener('click', () => switchTab('log'));
  document.getElementById('tab-btn-calendar').addEventListener('click', () => switchTab('calendar'));

  function switchTab(name){
    ['journal','calendar','log'].forEach(n => {
      document.getElementById('tab-'+n).classList.toggle('active', n===name);
      document.getElementById('tab-btn-'+n).classList.toggle('active', n===name);
    });
    if(name==='calendar') renderChart();
  }

  document.getElementById('s-fill-add').addEventListener('click', () => addFillRow());

  resetFills();
  resetNotes();
  load();

  window.addEventListener('resize', () => {
    if(document.getElementById('tab-calendar').classList.contains('active')) renderChart();
  });
})();
</script>
</body>
</html>
