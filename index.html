<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORB Trade Log</title>
<style>
  *{box-sizing:border-box;}
  body{background:#0a0a0a; margin:0; padding:20px; display:flex; justify-content:center;}
  #orb-simple{background:#111; color:#fff; font-family:Arial,Helvetica,sans-serif; font-weight:700; border-radius:10px; padding:28px; border:1px solid #333; width:100%; max-width:900px;}
  #orb-simple h2,#orb-simple h3{font-family:inherit; margin:0 0 20px; font-weight:800;}
  #orb-simple h2{font-size:28px; margin-bottom:24px;}
  #orb-simple h3{font-size:20px; color:#fff; font-weight:800;}
  #orb-simple label{font-size:16px; color:#fff; font-weight:700;}
  #orb-simple input,#orb-simple select{
    background:#1c1c1c; color:#fff; border:2px solid #555; border-radius:6px;
    font-family:inherit; font-weight:700; font-size:18px; padding:12px 14px; width:100%;
  }
  #orb-simple table{width:100%; border-collapse:collapse; font-size:16px; margin-top:20px;}
  #orb-simple th,#orb-simple td{border-bottom:2px solid #444; padding:14px 12px; text-align:left; white-space:nowrap;}
  #orb-simple th{color:#fff; font-weight:800; font-size:15px;}
  #orb-simple td{font-weight:700;}
  #orb-simple button{font-family:inherit; cursor:pointer; border-radius:6px; border:2px solid #666; background:#2a2a2a; color:#fff; padding:14px 22px; font-size:17px; font-weight:800;}
  #orb-simple button:hover{background:#3a3a3a;}
  #orb-simple .del{color:#ff8080; border-color:#5a2c2c; background:transparent; padding:8px 14px; font-size:16px;}
  #orb-simple .win{color:#5eff9d;}
  #orb-simple .loss{color:#ff8080;}
  #orb-simple .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}
  #orb-simple .cal-day{background:#1a1a1a; border:2px solid #3a3a3a; border-radius:6px; padding:8px; min-height:64px; font-size:14px; font-weight:700; overflow:hidden;}
  #orb-simple .cal-day .n{color:#bbb; font-size:14px; font-weight:800;}
  #orb-simple .cal-day .p{font-size:13px; margin-top:4px; font-weight:800; overflow-wrap:break-word; line-height:1.2;}
  #orb-simple .cal-head{text-align:center; font-size:14px; color:#ccc; padding-bottom:6px; font-weight:800;}
  #orb-simple .capbar{display:flex; gap:28px; align-items:center; margin-bottom:28px; flex-wrap:wrap;}
  #orb-simple .capbar label{font-size:16px; color:#fff;}
  #orb-simple .toolbar{display:flex; gap:14px; margin-bottom:28px; flex-wrap:wrap;}
  #orb-simple table{overflow-x:auto; display:block;}
  #orb-simple td.notes-cell{white-space:pre-wrap; min-width:220px; max-width:320px;}
  #orb-simple #s-balance{font-size:17px !important; color:#fff !important; font-weight:800;}
  #orb-simple #s-total{font-size:16px !important; color:#fff !important; font-weight:800; margin-top:16px;}
  #orb-simple .fill-row{display:grid; grid-template-columns:1fr 1fr auto; gap:12px; margin-bottom:12px; align-items:center;}
  #orb-simple .fill-remove{color:#ff8080; border-color:#5a2c2c; padding:10px 16px; font-size:15px;}
  #orb-simple .field-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; margin-bottom:20px;}
  #orb-simple .field-block{margin-bottom:24px;}
  #orb-simple .section-gap{margin-bottom:32px;}
</style>
</head>
<body>

<div id="orb-simple">
  <h2>ORB trade log</h2>

  <div class="capbar">
    <div>
      <label>starting capital</label>
      <input id="s-capital" type="number" step="0.01" placeholder="e.g. 5000" style="width:140px;">
    </div>
    <div style="font-size:12px; color:#aaa;" id="s-balance"></div>
  </div>

  <div id="s-cal-wrap" class="section-gap">
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:12px;">
      <button id="s-cal-prev">‹</button>
      <h3 id="s-cal-title" style="margin:0;"></h3>
      <button id="s-cal-next">›</button>
    </div>
    <div class="cal-grid" id="s-cal-head"></div>
    <div class="cal-grid" id="s-cal-body" style="margin-top:6px;"></div>
  </div>

  <div class="field-row">
    <input id="s-date" type="date">
    <input id="s-ticker" placeholder="ticker">
    <select id="s-dir"><option value="call">call</option><option value="put">put</option></select>
    <input id="s-strike" type="number" step="0.5" placeholder="strike">
    <input id="s-exp" type="date" placeholder="expiration">
  </div>
  <div class="field-block">
    <label style="display:block; margin-bottom:8px;">entries — add one row per fill if you scaled in</label>
    <div id="s-fills"></div>
    <button id="s-fill-add" type="button" style="margin-top:8px; font-size:15px; padding:10px 16px;">+ add another fill</button>
  </div>
  <div class="field-row">
    <input id="s-exit" type="number" step="0.01" placeholder="exit price">
    <input id="s-exit-date" type="date" placeholder="exit date">
    <input id="s-fees" type="number" step="0.01" placeholder="commissions ($)">
  </div>
  <div class="field-block">
    <label style="display:block; margin-bottom:8px;">notes — how you felt before, during, and after. what you did well, what you did badly.</label>
    <textarea id="s-notes" rows="3" required style="width:100%; resize:vertical; background:#1c1c1c; color:#fff; border:2px solid #555; border-radius:6px; font-family:inherit; font-weight:700; font-size:17px; padding:12px 14px;" placeholder="e.g. felt anxious waiting for confirmation, jumped in before the rejection wick, chased the move after missing entry..."></textarea>
  </div>
  <div id="s-notes-warn" style="display:none; color:#ff8080; font-size:15px; font-weight:800; margin-bottom:16px;">notes are required — write what happened.</div>
  <button id="s-add">add trade</button>

  <div class="toolbar" style="margin-top:28px;">
    <button id="s-export">export backup</button>
    <button id="s-import">import backup</button>
    <input id="s-import-file" type="file" accept="application/json" style="display:none;">
  </div>

  <div style="overflow-x:auto; margin-top:28px;">
  <table>
    <thead><tr>
      <th>date</th><th>ticker</th><th>dir</th><th>strike</th><th>exp</th><th>qty</th><th>entry</th><th>exit</th><th>exit date</th><th>comm.</th><th>p/l</th><th>notes</th><th></th>
    </tr></thead>
    <tbody id="s-body"></tbody>
  </table>
  </div>
  <div id="s-total" style="margin-top:16px; font-size:12px; color:#aaa;"></div>
</div>

<script>
(function(){
  const KEY = 'orb-journal-trades';
  const CAP_KEY = 'orb-journal-capital';
  let rows = [];
  let capital = null;
  let calMonth = new Date(); calMonth.setDate(1);

  function fmtMoney(n){ if(n===null||isNaN(n)) return '—'; const s=n<0?'-':''; return s+'$'+Math.abs(n).toFixed(2); }

  function addFillRow(qty, price){
    const wrap = document.getElementById('s-fills');
    const row = document.createElement('div');
    row.className = 'fill-row';
    row.innerHTML = `
      <input type="number" step="1" class="fill-qty" placeholder="contracts" value="${qty!==undefined?qty:''}">
      <input type="number" step="0.01" class="fill-price" placeholder="fill price" value="${price!==undefined?price:''}">
      <button type="button" class="fill-remove">x</button>
    `;
    row.querySelector('.fill-remove').addEventListener('click', () => {
      if(document.querySelectorAll('.fill-row').length > 1) row.remove();
    });
    wrap.appendChild(row);
  }

  function resetFills(){
    document.getElementById('s-fills').innerHTML = '';
    addFillRow(1, '');
  }

  function collectFills(){
    return [...document.querySelectorAll('.fill-row')].map(row => ({
      qty: row.querySelector('.fill-qty').value,
      price: row.querySelector('.fill-price').value
    })).filter(f => f.qty !== '' && f.price !== '');
  }

  function fillsSummary(fills){
    const totalQty = fills.reduce((a,f) => a + (parseFloat(f.qty)||0), 0);
    const totalCost = fills.reduce((a,f) => a + (parseFloat(f.qty)||0) * (parseFloat(f.price)||0), 0);
    const avgPrice = totalQty ? totalCost / totalQty : null;
    return { totalQty, avgPrice };
  }
  function tradePnl(r){
    const exit = parseFloat(r.exit), fees = parseFloat(r.fees) || 0;
    if(isNaN(exit)) return null;
    let totalQty, avgEntry;
    if(Array.isArray(r.fills) && r.fills.length){
      const s = fillsSummary(r.fills);
      totalQty = s.totalQty; avgEntry = s.avgPrice;
    } else {
      totalQty = parseFloat(r.qty) || 1;
      avgEntry = parseFloat(r.entry);
    }
    if(!totalQty || avgEntry===null || isNaN(avgEntry)) return null;
    return (exit-avgEntry)*totalQty*100 - fees;
  }

  function load(){
    try{ const v = localStorage.getItem(KEY); rows = v ? JSON.parse(v) : []; }
    catch(e){ rows = []; }
    try{ const c = localStorage.getItem(CAP_KEY); capital = c ? JSON.parse(c) : null; }
    catch(e){ capital = null; }
    if(capital !== null) document.getElementById('s-capital').value = capital;
    render();
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(rows)); }
    catch(e){ console.error(e); }
  }
  function saveCapital(){
    try{ localStorage.setItem(CAP_KEY, JSON.stringify(capital)); }
    catch(e){ console.error(e); }
  }

  function renderCalendar(){
    const head = document.getElementById('s-cal-head');
    head.innerHTML = ['S','M','T','W','T','F','S'].map(d=>`<div class="cal-head">${d}</div>`).join('');

    const year = calMonth.getFullYear(), month = calMonth.getMonth();
    document.getElementById('s-cal-title').textContent = calMonth.toLocaleString('default',{month:'long', year:'numeric'});

    const byDay = {};
    rows.forEach(r => {
      const bucketDate = r.exit_date || r.date;
      if(!bucketDate) return;
      const pnl = tradePnl(r);
      if(pnl === null) return;
      byDay[bucketDate] = (byDay[bucketDate] || 0) + pnl;
    });

    const firstDow = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const body = document.getElementById('s-cal-body');
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += '<div></div>';
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const pnl = byDay[dateStr];
      let bg = '#1a1a1a', color = '#777', ptext = '';
      if(pnl !== undefined){
        color = pnl > 0 ? '#4ade80' : (pnl < 0 ? '#ff6b6b' : '#999');
        bg = pnl > 0 ? 'rgba(74,222,128,0.12)' : (pnl < 0 ? 'rgba(255,107,107,0.12)' : '#1a1a1a');
        ptext = `<div class="p" style="color:${color};">${fmtMoney(pnl)}</div>`;
      }
      cells += `<div class="cal-day" style="background:${bg};"><div class="n">${d}</div>${ptext}</div>`;
    }
    body.innerHTML = cells;
  }

  function renderBalance(){
    const totalPnl = rows.reduce((a,r) => { const p = tradePnl(r); return a + (p||0); }, 0);
    const balEl = document.getElementById('s-balance');
    if(capital === null || isNaN(capital)){ balEl.textContent = ''; return; }
    const bal = capital + totalPnl;
    balEl.textContent = `balance (after commissions): ${fmtMoney(bal)} (started at ${fmtMoney(capital)}, ${totalPnl>=0?'+':''}${fmtMoney(totalPnl)})`;
  }

  function render(){
    const body = document.getElementById('s-body');
    let total = 0, count = 0;
    body.innerHTML = rows.slice().reverse().map((r, revIdx) => {
      const idx = rows.length - 1 - revIdx;
      const pnl = tradePnl(r);
      if(pnl !== null){ total += pnl; count++; }
      const cls = pnl===null ? '' : (pnl>0?'win':(pnl<0?'loss':''));
      let qtyDisplay, entryDisplay;
      if(Array.isArray(r.fills) && r.fills.length){
        const s = fillsSummary(r.fills);
        qtyDisplay = s.totalQty;
        entryDisplay = s.avgPrice!==null ? `avg ${s.avgPrice.toFixed(2)}` : '';
        if(r.fills.length > 1){
          entryDisplay += ` <span style="color:#999; font-weight:700; font-size:13px;">(${r.fills.map(f=>`${f.qty}@${f.price}`).join(', ')})</span>`;
        }
      } else {
        qtyDisplay = r.qty || '';
        entryDisplay = r.entry || '';
      }
      return `<tr>
        <td>${r.date||''}</td>
        <td>${(r.ticker||'').toUpperCase()}</td>
        <td>${r.dir}</td>
        <td>${r.strike||''}</td>
        <td>${r.exp||''}</td>
        <td>${qtyDisplay}</td>
        <td>${entryDisplay}</td>
        <td>${r.exit||''}</td>
        <td>${r.exit_date||''}</td>
        <td>${r.fees ? fmtMoney(parseFloat(r.fees)) : '—'}</td>
        <td class="${cls}">${pnl===null?'—':fmtMoney(pnl)}</td>
        <td class="notes-cell">${(r.notes||'').replace(/\n/g,'<br>')}</td>
        <td><button class="del" data-idx="${idx}">x</button></td>
      </tr>`;
    }).join('');
    document.getElementById('s-total').textContent = count ? `total p/l after commissions on ${count} closed trade${count>1?'s':''}: ${fmtMoney(total)}` : '';
    body.querySelectorAll('.del').forEach(b => {
      b.addEventListener('click', () => {
        rows.splice(parseInt(b.getAttribute('data-idx')), 1);
        save(); render();
      });
    });
    renderCalendar();
    renderBalance();
  }

  document.getElementById('s-add').addEventListener('click', () => {
    const ticker = document.getElementById('s-ticker').value.trim();
    const notes = document.getElementById('s-notes').value.trim();
    const warn = document.getElementById('s-notes-warn');
    const fills = collectFills();
    if(!ticker) return;
    if(!fills.length){ alert('add at least one entry fill (contracts + price)'); return; }
    if(!notes){ warn.style.display = 'block'; document.getElementById('s-notes').focus(); return; }
    warn.style.display = 'none';
    rows.push({
      date: document.getElementById('s-date').value,
      ticker,
      dir: document.getElementById('s-dir').value,
      strike: document.getElementById('s-strike').value,
      exp: document.getElementById('s-exp').value,
      fills,
      exit: document.getElementById('s-exit').value,
      exit_date: document.getElementById('s-exit-date').value,
      fees: document.getElementById('s-fees').value,
      notes
    });
    save(); render();
    ['s-ticker','s-strike','s-exp','s-exit','s-exit-date','s-fees','s-notes'].forEach(id => document.getElementById(id).value = '');
    resetFills();
  });

  document.getElementById('s-capital').addEventListener('change', (e) => {
    const v = parseFloat(e.target.value);
    capital = isNaN(v) ? null : v;
    saveCapital(); renderBalance();
  });

  document.getElementById('s-cal-prev').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth()-1); renderCalendar();
  });
  document.getElementById('s-cal-next').addEventListener('click', () => {
    calMonth.setMonth(calMonth.getMonth()+1); renderCalendar();
  });

  document.getElementById('s-export').addEventListener('click', () => {
    const data = { trades: rows, capital: capital };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'orb-journal-backup.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('s-import').addEventListener('click', () => {
    document.getElementById('s-import-file').click();
  });
  document.getElementById('s-import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(Array.isArray(data.trades)){
          rows = data.trades;
          capital = data.capital !== undefined ? data.capital : null;
          save(); saveCapital();
          if(capital !== null) document.getElementById('s-capital').value = capital;
          render();
        }
      }catch(err){ alert('could not read that backup file'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('s-fill-add').addEventListener('click', () => addFillRow());

  resetFills();
  load();
})();
</script>
</body>
</html>
